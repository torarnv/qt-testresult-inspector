<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tar.zst inspector</title>
<style>
  :root {
    --bg: #0a0f1a;
    --panel: #111a2b;
    --panel-2: #0d1522;
    --line: #22314a;
    --text: #dbe4f0;
    --text-dim: #7c8aa3;
    --accent: #4fd6b0;
    --accent-dim: #2c7a63;
    --warn: #e0a75e;
    --err: #e5392a;
    --radius: 3px;
  }
  * { box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    margin: 0;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
  }
  body { padding: 32px 20px 24px; }
  .wrap { max-width: none; margin: 0; }

  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: lowercase;
    margin: 0 0 4px;
    color: var(--text);
  }
  h1::before { content: "$ "; color: var(--accent); }
  .sub {
    color: var(--text-dim);
    font-size: 12.5px;
    margin: 0 0 28px;
    max-width: 640px;
  }
  .sub a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent-dim); }
  .sub a:hover { border-bottom-style: solid; }

  form {
    display: grid;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  input[type=text], input[type=url] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 10px;
    border-radius: var(--radius);
    font: inherit;
  }
  input[type=text]:focus, input[type=url]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }
  .row { display: grid; grid-template-columns: 2fr 1.3fr auto; gap: 10px; align-items: end; }
  @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }

  button {
    font: inherit;
    cursor: pointer;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 9px 16px;
    background: var(--panel-2);
    color: var(--text);
  }
  button:hover { border-color: var(--accent-dim); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #06231c;
    font-weight: 600;
  }
  .btn-primary:hover { background: #5fe6c0; border-color: #5fe6c0; }
  .btn-ghost { background: transparent; }
  .btn-sm { padding: 5px 10px; font-size: 12.5px; }

  .hint { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

  #status {
    margin-top: 18px;
    display: none;
  }
  #status.active { display: block; }
  .statline { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 12.5px; margin-bottom: 6px; }
  .statline strong { color: var(--text); font-weight: 500; }
  .bar-track { background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius); height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width .15s linear; }
  .bar-fill.indeterminate {
    width: 30% !important;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0% { margin-left: -30%; }
    100% { margin-left: 100%; }
  }
  .cancel-line { margin-top: 8px; }

  #results { margin-top: 22px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .panel + .panel { margin-top: 14px; }
  .msg-err { color: var(--err); }
  .msg-warn { color: var(--warn); }
  .msg-ok { color: var(--accent); }
  .meta { color: var(--text-dim); font-size: 12.5px; margin: 6px 0 12px; }
  .meta b { color: var(--text); font-weight: 500; }

  .crumb { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .crumb-link { color: var(--accent); text-decoration: none; cursor: pointer; border-bottom: 1px dotted var(--accent-dim); }
  .crumb-link:hover { border-bottom-style: solid; }
  .crumb-sep { color: var(--text-dim); }

  pre.preview {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12.5px;
    margin: 0;
  }
  pre.preview.nowrap { white-space: pre; word-break: normal; }
  .truncated-note { color: var(--warn); font-size: 12px; margin-top: 8px; }

  .test-summary {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel-2);
    padding: 10px 12px;
    margin: 0 0 12px;
    max-height: 30vh;
    overflow: auto;
  }
  .test-summary-head {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 8px;
  }
  .test-summary ul { list-style: none; margin: 0; padding: 0; }
  .test-result {
    display: block;
    text-decoration: none;
    color: var(--text);
    padding: 3px 4px;
    border-radius: var(--radius);
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .test-result:hover { background: var(--panel); }
  .test-result .rtype { font-weight: 600; display: inline-block; min-width: 52px; }
  .test-fail .rtype { color: var(--err); }
  .test-other .rtype { color: var(--warn); }
  .hit-fail { color: var(--err); }
  .hit-other { color: var(--warn); }
  .result-hit b, .hit-fail, .hit-other { font-weight: 600; }
  @keyframes result-flash {
    from { background-color: var(--accent); color: #06231c; }
    to { background-color: transparent; }
  }
  .result-hit.flash { animation: result-flash 1s ease-out; }

  .file-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 12px;
  }
  .wrap-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
  }
  .wrap-toggle input { accent-color: var(--accent); cursor: pointer; }

  table.listing { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.listing th, table.listing td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  table.listing th { color: var(--text-dim); font-weight: 500; text-transform: uppercase; font-size: 10.5px; letter-spacing: .05em; }
  table.listing td.size { color: var(--text-dim); white-space: nowrap; }
  table.listing td.actions { white-space: nowrap; text-align: right; }
  table.listing tr.clickable { cursor: pointer; }
  table.listing tr.clickable:hover td { background: var(--panel-2); }
  .filter-row { margin-bottom: 10px; }
  .filter-row input { max-width: 320px; display: inline-block; }
  .count-note { color: var(--text-dim); font-size: 12px; margin-top: 8px; }


</style>
</head>
<body>
<div class="wrap">

  <h1>tar.zst inspector</h1>
  <p class="sub">
    Point this at a <code>.tar.zst</code> URL and optionally name a file inside it.
    Everything runs in your browser — the archive is streamed and decompressed
    locally, nothing is uploaded anywhere.
  </p>

  <form id="form">
    <div class="row">
      <div>
        <label for="url">Archive URL</label>
        <input type="url" id="url" placeholder="https://example.com/testresults.tar.zst" required>
      </div>
      <div>
        <label for="filename">File inside archive (optional)</label>
        <input type="text" id="filename" placeholder="test_summary.ctest_junit_xml">
      </div>
      <button type="submit" class="btn-primary" id="go">Fetch</button>
    </div>
    <div class="hint">Leave the filename blank to list everything in the archive first.</div>
  </form>

  <div id="status">
    <div class="statline">
      <span id="statusLabel">working…</span>
      <strong id="statusNum"></strong>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="cancel-line"><button type="button" class="btn-ghost btn-sm" id="cancelBtn">Cancel</button></div>
  </div>

  <div id="results"></div>

</div>

<script>
(function () {
  "use strict";

  // ---------- tar streaming parser ----------

  const textDecoder = new TextDecoder("utf-8", { fatal: false });

  function readStr(header, offset, length) {
    const bytes = header.subarray(offset, offset + length);
    let end = bytes.indexOf(0);
    if (end === -1) end = bytes.length;
    return textDecoder.decode(bytes.subarray(0, end));
  }

  function readSize(header) {
    const field = header.subarray(124, 136);
    if (field[0] & 0x80) {
      // GNU base-256 encoded size (for files/offsets that don't fit in octal ASCII)
      let value = BigInt(field[0] & 0x7f);
      for (let i = 1; i < field.length; i++) value = (value << 8n) + BigInt(field[i]);
      return Number(value);
    }
    let s = "";
    for (let i = 0; i < field.length; i++) {
      const c = field[i];
      s += c === 0 ? " " : String.fromCharCode(c);
    }
    s = s.trim();
    return s ? parseInt(s, 8) : 0;
  }

  function isAllZero(buf) {
    for (let i = 0; i < buf.length; i++) if (buf[i] !== 0) return false;
    return true;
  }

  function concatBytes(a, b) {
    const out = new Uint8Array(a.length + b.length);
    out.set(a, 0);
    out.set(b, a.length);
    return out;
  }

  function parsePaxRecords(text) {
    const result = {};
    let i = 0;
    while (i < text.length) {
      let j = i;
      while (j < text.length && text[j] !== " ") j++;
      const len = parseInt(text.slice(i, j), 10);
      if (!len || isNaN(len) || len <= 0) break;
      const record = text.slice(i, i + len);
      const spaceIdx = record.indexOf(" ");
      const eq = record.indexOf("=", spaceIdx);
      if (spaceIdx === -1 || eq === -1) break;
      const key = record.slice(spaceIdx + 1, eq);
      let value = record.slice(eq + 1);
      if (value.endsWith("\n")) value = value.slice(0, -1);
      result[key] = value;
      i += len;
    }
    return result;
  }

  // onEntry(entry) fires for every real file/dir header ({name, size, type}).
  // It must return null (skip data) or {write(chunk), end()} to capture bytes.
  class TarParser {
    constructor(onEntry) {
      this.onEntry = onEntry;
      this.buf = new Uint8Array(0);
      this.mode = "header";
      this.pendingName = null;
      this.pendingSize = null;
      this.current = null;
      this.zeroBlocks = 0;
      this.ended = false;
    }

    push(chunk) {
      if (this.ended || !chunk || chunk.length === 0) return;
      this.buf = concatBytes(this.buf, chunk);
      this._process();
    }

    _process() {
      while (true) {
        if (this.mode === "data") {
          const c = this.current;
          const take = Math.min(this.buf.length, c.remaining);
          if (take > 0) {
            if (c.consumer) c.consumer.write(this.buf.subarray(0, take));
            this.buf = this.buf.subarray(take);
            c.remaining -= take;
          }
          if (c.remaining > 0) return;
          const pad = (512 - (c.size % 512)) % 512;
          if (this.buf.length < pad) return;
          this.buf = this.buf.subarray(pad);
          if (c.consumer) c.consumer.end();
          this.current = null;
          this.mode = "header";
          continue;
        }

        if (this.buf.length < 512) return;
        const header = this.buf.subarray(0, 512);
        this.buf = this.buf.subarray(512);

        if (isAllZero(header)) {
          this.zeroBlocks++;
          if (this.zeroBlocks >= 2) { this.ended = true; return; }
          continue;
        }
        this.zeroBlocks = 0;

        const typeflag = String.fromCharCode(header[156]);
        const size = this.pendingSize !== null ? this.pendingSize : readSize(header);
        let name = readStr(header, 0, 100);
        const prefix = readStr(header, 345, 155);
        if (prefix) name = prefix + "/" + name;
        if (this.pendingName !== null) name = this.pendingName;
        this.pendingName = null;
        this.pendingSize = null;

        if (typeflag === "L") { // GNU long name: data is the name for the *next* header
          let collected = new Uint8Array(0);
          this.current = {
            size, remaining: size,
            consumer: {
              write: (d) => { collected = concatBytes(collected, d); },
              end: () => {
                let s = textDecoder.decode(collected);
                const nul = s.indexOf("\0");
                this.pendingName = nul >= 0 ? s.slice(0, nul) : s;
              }
            }
          };
          this.mode = "data";
          continue;
        }

        if (typeflag === "x" || typeflag === "g") { // pax extended header
          let collected = new Uint8Array(0);
          this.current = {
            size, remaining: size,
            consumer: {
              write: (d) => { collected = concatBytes(collected, d); },
              end: () => {
                const kv = parsePaxRecords(textDecoder.decode(collected));
                if (kv.path) this.pendingName = kv.path;
                if (kv.size) this.pendingSize = parseInt(kv.size, 10);
              }
            }
          };
          this.mode = "data";
          continue;
        }

        const consumer = this.onEntry({ name, size, type: typeflag });
        this.current = { name, size, remaining: size, consumer };
        this.mode = "data";
      }
    }
  }

  // ---------- archive scanning (Web Worker) ----------

  function concatAll(chunks, totalLen) {
    const out = new Uint8Array(totalLen);
    let offset = 0;
    for (const c of chunks) { out.set(c, offset); offset += c.length; }
    return out;
  }

  // In-tab cache of the whole decompressed archive: navigating between any of
  // its files never re-fetches or re-decompresses. Holds one archive at a time
  // (the most recent) — its full entry list plus every file's bytes. This is a
  // plain JS-heap object, so the browser frees it when the tab closes; loading a
  // different archive drops the previous one (see cacheStore's url check). The
  // whole point is to keep everything, so there's no byte budget — the cost is
  // holding the archive's full uncompressed size in memory while the tab is open.
  const cache = { url: null, entries: null, files: new Map() };

  function cacheStore(url, entries, name, data) {
    if (cache.url !== url) { cache.url = url; cache.entries = null; cache.files = new Map(); }
    if (entries) cache.entries = entries;
    if (name && data) cache.files.set(name, data);
  }

  // Runs inside the Web Worker. Streams `url`, decompresses zstd, walks the tar,
  // and captures *every* file's bytes — we already decompress the whole archive
  // to the end (to complete the browser's HTTP cache of the compressed body), so
  // this keeps the results instead of discarding them. If targetName is given,
  // the instant that one entry is complete it's posted back ("found") so the UI
  // can render before the walk finishes. At the end, "done" hands the main
  // thread the full entry list plus all captured files — transferred (zero-copy)
  // so ownership moves out of the worker rather than being duplicated. The main
  // thread then caches the lot for instant navigation.
  //
  // force-cache reuses a cached copy without revalidating — even on a manual
  // reload — and only hits the network when the archive isn't cached at all.
  function workerScan() {
    self.onmessage = async (ev) => {
      const { url, targetName } = ev.data;
      const post = (msg, transfer) => self.postMessage(msg, transfer || []);

      let res;
      try {
        res = await fetch(url, { mode: "cors", cache: "force-cache" });
      } catch (e) {
        post({ type: "error", kind: "fetch", message: (e && e.message) || String(e) });
        return;
      }
      if (!res.ok) {
        post({ type: "error", kind: "http", status: res.status, statusText: res.statusText });
        return;
      }

      const entries = [];
      const files = new Map(); // name -> Uint8Array, everything except the posted target
      let posted = false;

      const parser = new TarParser((entry) => {
        entries.push(entry);
        if (entry.type === "5") return null; // directory, no body to capture
        let chunks = [];
        return {
          write: (d) => chunks.push(d),
          end: () => {
            const data = concatAll(chunks, entry.size);
            chunks = null;
            if (targetName && !posted && entry.name === targetName) {
              // Render this one immediately; ownership moves to the main thread,
              // so it's not kept in `files` (it'd be a detached buffer anyway).
              posted = true;
              post({ type: "found", entry, data: data.buffer }, [data.buffer]);
            } else {
              files.set(entry.name, data);
            }
          }
        };
      });

      let parseError = null;
      let decompressedBytes = 0;
      let lastPost = 0;
      let sentEntries = 0; // entries already sent to the main thread as deltas
      // Report progress from the decompression stream, not the network reads:
      // a cached body arrives in one chunk, so network reads say nothing about
      // the 1–2 s of zstd work. fzstd calls this per decompressed block, giving
      // fine granularity even then. Throttled, and emitted for the whole walk —
      // even after the target's "found" — so that navigating back to the listing
      // mid-extraction still shows live progress. The main thread ignores it
      // whenever a view is already on screen.
      const zstd = new fzstd.Decompress((chunk) => {
        try { parser.push(chunk); } catch (e) { parseError = e; }
        decompressedBytes += chunk.length;
        const now = Date.now();
        if (now - lastPost >= 60) {
          lastPost = now;
          const cur = parser.current;
          const newEntries = entries.slice(sentEntries);
          sentEntries = entries.length;
          post({
            type: "progress",
            decompressedBytes,
            entriesSeen: entries.length,
            newEntries,
            currentName: cur && cur.name ? cur.name
              : (entries.length ? entries[entries.length - 1].name : null),
            currentSize: cur && cur.name ? cur.size : null,
            currentRead: cur && cur.name ? cur.size - cur.remaining : null
          });
        }
      });
      const failZstd = (m) => post({ type: "error", kind: "zstd", message: m });

      // Hand the main thread the full entry list and every captured file, all
      // buffers transferred in one go (zero-copy) so we don't duplicate ~565 MB.
      const postDone = () => {
        const names = [];
        const buffers = [];
        for (const [name, data] of files) { names.push(name); buffers.push(data.buffer); }
        post({ type: "done", entries, names, buffers }, buffers);
      };

      if (!res.body) {
        // Fallback for workers without streaming response bodies: read it all,
        // then decompress in one shot.
        const full = new Uint8Array(await res.arrayBuffer());
        try { zstd.push(full, true); } catch (e) { failZstd(e.message); return; }
        if (parseError) { failZstd(parseError.message); return; }
        postDone();
        return;
      }

      const reader = res.body.getReader();
      while (true) {
        let chunk;
        try {
          chunk = await reader.read();
        } catch (e) {
          post({ type: "error", kind: "fetch", message: (e && e.message) || String(e) });
          return;
        }
        if (chunk.done) {
          try { zstd.push(new Uint8Array(0), true); } catch (e) { failZstd(e.message); return; }
          break;
        }
        try { zstd.push(chunk.value); } catch (e) { failZstd(e.message); return; }
        if (parseError) { failZstd(parseError.message); return; }
      }
      if (parseError) { failZstd(parseError.message); return; }
      postDone();
    };
  }

  // Assemble the worker source from the shared parser code (stringified so this
  // stays a single self-contained file) plus the scan driver above, and hand it
  // to the worker as a Blob URL. fzstd is pulled in with importScripts.
  const workerUrl = URL.createObjectURL(new Blob([[
    'importScripts("https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js");',
    'const textDecoder = new TextDecoder("utf-8", { fatal: false });',
    readStr, readSize, isAllZero, concatBytes, concatAll, parsePaxRecords, TarParser,
    "(", workerScan, ")();"
  ].map(String).join("\n")], { type: "text/javascript" }));

  // ---------- helpers ----------

  function formatBytes(n) {
    if (n == null) return "?";
    const units = ["B", "KB", "MB", "GB", "TB"];
    let i = 0, v = n;
    while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
    return (i === 0 ? v : v.toFixed(v < 10 ? 2 : 1)) + " " + units[i];
  }

  function setCookie(name, value) {
    document.cookie = name + "=" + encodeURIComponent(value) + ";max-age=31536000;samesite=lax";
  }

  function getCookie(name) {
    const m = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return m ? decodeURIComponent(m[1]) : null;
  }

  function archiveName(url) {
    try {
      const seg = new URL(url).pathname.split("/").filter(Boolean).pop();
      return seg || url;
    } catch (_) {
      return url.split("/").pop() || url;
    }
  }

  // Build a case-insensitive matcher from a filter string. Supports glob-style
  // wildcards: * = any run of chars, ? = one char. Matched unanchored (as a
  // substring) so a leading path prefix doesn't defeat the pattern.
  function buildFilterMatcher(pattern) {
    const p = pattern.trim();
    if (!p) return null;
    const rx = p.replace(/[.+^${}()|[\]\\]/g, "\\$&").replace(/\*/g, ".*").replace(/\?/g, ".");
    try {
      const re = new RegExp(rx, "i");
      return (name) => re.test(name);
    } catch (_) {
      const lower = p.toLowerCase();
      return (name) => name.toLowerCase().includes(lower);
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  const TEXT_EXTENSIONS = /\.(txt|xml|log|json|junit\.xml|md|markdown|yaml|yml|csv|html?|js|mjs|py|c|cc|cpp|h|hpp|sh|zsh|cfg|ini|conf|diff|patch|toml|cmake|qml|pro|pri)$/i;

  function looksLikeText(name, bytes) {
    if (TEXT_EXTENSIONS.test(name)) return true;
    const sample = bytes.subarray(0, Math.min(bytes.length, 4096));
    let suspicious = 0;
    for (let i = 0; i < sample.length; i++) {
      const b = sample[i];
      if (b === 0) return false;
      if (b < 7 || (b > 13 && b < 32)) suspicious++;
    }
    return suspicious / (sample.length || 1) < 0.02;
  }

  function downloadBlob(bytes, filename) {
    const blob = new Blob([bytes]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename.split("/").pop() || "file";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 30000);
  }

  // ---------- UI wiring ----------

  const form = document.getElementById("form");
  const urlInput = document.getElementById("url");
  const filenameInput = document.getElementById("filename");
  const goBtn = document.getElementById("go");
  const statusEl = document.getElementById("status");
  const statusLabel = document.getElementById("statusLabel");
  const statusNum = document.getElementById("statusNum");
  const bar = document.getElementById("bar");
  const cancelBtn = document.getElementById("cancelBtn");
  const resultsEl = document.getElementById("results");
  const introEl = document.querySelector(".sub");

  // The intro blurb and the URL/file form are clutter once you're reading a
  // file (the breadcrumb navigates back), so hide them on the file view and
  // show them on the listing / empty / error views.
  function setHeaderVisible(v) {
    introEl.style.display = v ? "" : "none";
    form.style.display = v ? "" : "none";
  }

  let currentWorker = null;
  let scanUrl = null;        // archive the current worker is extracting
  let desiredTarget = null;  // "" = listing, or a filename — the view to show
  let viewRendered = false;  // is the desired view already on screen?

  function terminateWorker() {
    if (currentWorker) { currentWorker.terminate(); currentWorker = null; }
    scanUrl = null;
  }

  let wrapLines = getCookie("wrapLines") === "1";

  function setBusy(busy) {
    goBtn.disabled = busy;
    urlInput.disabled = busy;
    filenameInput.disabled = busy;
    statusEl.classList.toggle("active", busy);
  }

  // Total uncompressed size isn't known until the walk finishes, so the bar is
  // indeterminate; the numbers (decompressed bytes, entries, current name) are
  // what actually show how far along the scan is.
  function updateProgress({ decompressedBytes, entriesSeen, currentName, currentSize, currentRead }) {
    let label = "Loading…";
    if (currentName) {
      label = "Extracting: " + currentName;
      // Show byte progress within large entries — a big file (e.g. LastTest.log)
      // is where the walk spends its time, so the bare name would look stuck.
      if (currentSize != null && currentSize >= 1024 * 1024)
        label += " (" + formatBytes(currentRead) + " / " + formatBytes(currentSize) + ")";
    }
    statusLabel.textContent = label;
    bar.classList.add("indeterminate");
    statusNum.textContent = formatBytes(decompressedBytes) + " decompressed · " + entriesSeen + " entries";
  }

  function renderError(title, detail) {
    setHeaderVisible(true);
    resultsEl.innerHTML = "";
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML =
      '<div class="msg-err"><strong>' + escapeHtml(title) + "</strong></div>" +
      (detail ? '<div class="meta">' + detail + "</div>" : "");
    resultsEl.appendChild(panel);
  }

  function renderFetchFailed(url, rawMessage) {
    setHeaderVisible(true);
    resultsEl.innerHTML = "";
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML =
      '<div class="msg-err"><strong>Fetch failed.</strong></div>' +
      '<div class="meta" style="margin-top:8px">' +
      "Could not read a response from that URL — check that it's reachable and correct." +
      "</div>" +
      (rawMessage ? '<div class="meta" style="margin-top:10px;opacity:.7">raw error: ' + escapeHtml(rawMessage) + "</div>" : "");
    resultsEl.appendChild(panel);
  }

  // Qt testlib plain-text result incidents. Passes are excluded from the
  // non-pass summary; message lines (QWARN/QDEBUG/QINFO/...) aren't results.
  const RESULT_TYPES = new Set(
    ["PASS", "FAIL!", "XFAIL", "XPASS", "SKIP", "BPASS", "BFAIL", "BXPASS", "BXFAIL"]);
  const PASS_TYPES = new Set(["PASS", "BPASS", "XFAIL"]);

  // Pull non-pass result incidents out of a testlib log. Each carries its line
  // index (within the passed text) and a short label (the test function).
  function parseTestResults(text) {
    const lines = text.split("\n");
    const results = [];
    for (let i = 0; i < lines.length; i++) {
      const m = /^([A-Z][A-Z!]*)\s*:\s*(.*)$/.exec(lines[i]);
      if (!m) continue;
      const type = m[1];
      if (!RESULT_TYPES.has(type) || PASS_TYPES.has(type)) continue;
      const rest = m[2];
      const fm = /^([\w:]+\s*\([^)]*\))/.exec(rest);
      results.push({ line: i, type, label: fm ? fm[1] : rest.slice(0, 120) });
    }
    return results;
  }

  // Escape the log for HTML, wrapping each flagged result line in an anchored
  // span (id="res-<idx>") so the summary can jump to it.
  function annotateTestLog(text, results) {
    const ids = new Map();
    results.forEach((r, idx) => ids.set(r.line, idx));
    return text.split("\n").map((line, i) => {
      if (!ids.has(i)) return escapeHtml(line);
      const idAttr = ' id="res-' + ids.get(i) + '"';
      const m = /^([A-Z][A-Z!]*)(\s*:\s*)(.*)$/.exec(line);
      if (!m) return '<span class="result-hit"' + idAttr + ">" + escapeHtml(line) + "</span>";
      const cls = /FAIL/.test(m[1]) ? "hit-fail" : "hit-other";
      return '<span class="result-hit"' + idAttr + '><span class="' + cls + '">' +
        escapeHtml(m[1]) + "</span>" + escapeHtml(m[2]) + "<b>" + escapeHtml(m[3]) + "</b></span>";
    }).join("\n");
  }

  // A clickable list of the non-pass results; each entry scrolls the matching
  // anchored span into view and flashes it.
  function buildResultSummary(results, panel) {
    const summary = document.createElement("div");
    summary.className = "test-summary";
    const head = document.createElement("div");
    head.className = "test-summary-head";
    head.textContent = results.length + " non-pass result" + (results.length === 1 ? "" : "s");
    summary.appendChild(head);
    const ul = document.createElement("ul");
    results.forEach((r, idx) => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#";
      a.className = "test-result " + (/FAIL/.test(r.type) ? "test-fail" : "test-other");
      const badge = document.createElement("span");
      badge.className = "rtype";
      badge.textContent = r.type;
      a.appendChild(badge);
      a.appendChild(document.createTextNode(" " + r.label));
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        const target = panel.querySelector("#res-" + idx);
        if (!target) return;
        target.scrollIntoView({ block: "center" });
        target.classList.remove("flash");
        void target.offsetWidth;
        target.classList.add("flash");
      });
      li.appendChild(a);
      ul.appendChild(li);
    });
    summary.appendChild(ul);
    return summary;
  }

  function renderFound(entry, bytes) {
    setHeaderVisible(false);
    resultsEl.innerHTML = "";
    const panel = document.createElement("div");
    panel.className = "panel";

    const isText = looksLikeText(entry.name, bytes);
    const base = entry.name.split("/").pop();
    const isTestLog = /^tst_/.test(base) && /\.txt$/.test(base);
    const PREVIEW_CAP = 5 * 1024 * 1024;
    let bodyHtml = "";
    let testResults = null;

    if (isText) {
      const text = textDecoder.decode(bytes);
      const shown = text.length > PREVIEW_CAP ? text.slice(0, PREVIEW_CAP) : text;
      const truncNote = text.length > PREVIEW_CAP
        ? '<div class="truncated-note">Preview truncated at ' + formatBytes(PREVIEW_CAP) + " — download for the full file.</div>"
        : "";
      if (isTestLog) {
        testResults = parseTestResults(shown);
        bodyHtml = '<pre class="preview">' + annotateTestLog(shown, testResults) + "</pre>" + truncNote;
      } else {
        bodyHtml = '<pre class="preview">' + escapeHtml(shown) + "</pre>" + truncNote;
      }
    } else {
      bodyHtml = '<div class="meta">Binary content — no inline preview.</div>';
    }

    panel.innerHTML =
      '<div class="msg-ok crumb"><a href="#" class="crumb-link">' + escapeHtml(archiveName(urlInput.value.trim())) + "</a>" +
      '<span class="crumb-sep">/</span><strong>' + escapeHtml(entry.name) + "</strong></div>" +
      '<div class="meta"><b>' + formatBytes(entry.size) + "</b></div>" + bodyHtml;

    panel.querySelector(".crumb-link").addEventListener("click", (ev) => {
      ev.preventDefault();
      navigate(urlInput.value.trim(), "", true);
    });

    if (testResults && testResults.length) {
      const pre = panel.querySelector(".preview");
      panel.insertBefore(buildResultSummary(testResults, panel), pre);
    }

    const controls = document.createElement("div");
    controls.className = "file-controls";

    const dlBtn = document.createElement("button");
    dlBtn.className = "btn-ghost btn-sm";
    dlBtn.textContent = "Download";
    dlBtn.onclick = () => downloadBlob(bytes, entry.name);
    controls.appendChild(dlBtn);

    panel.appendChild(controls);
    resultsEl.appendChild(panel);

    const pre = panel.querySelector(".preview");
    if (pre) {
      pre.classList.toggle("nowrap", !wrapLines);

      const toggle = document.createElement("label");
      toggle.className = "wrap-toggle";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = wrapLines;
      cb.addEventListener("change", () => {
        wrapLines = cb.checked;
        setCookie("wrapLines", wrapLines ? "1" : "0");
        pre.classList.toggle("nowrap", !wrapLines);
      });
      toggle.appendChild(cb);
      toggle.appendChild(document.createTextNode("wrap lines"));
      controls.appendChild(toggle);
    }

    if (jumpToTestFailure && testResults && testResults.length) {
      const idx = findTestResultIndex(testResults, jumpToTestFailure);
      const target = idx >= 0 && panel.querySelector("#res-" + idx);
      if (target) {
        jumpToTestFailure = null;
        requestAnimationFrame(() => {
          target.scrollIntoView({ block: "center" });
          target.classList.add("flash");
        });
      }
    }
  }

  function renderNotFound(targetName, entries) {
    setHeaderVisible(true);
    resultsEl.innerHTML = "";
    const panel = document.createElement("div");
    panel.className = "panel";
    const needle = targetName.toLowerCase();
    const similar = entries.filter(e => e.name.toLowerCase().includes(needle) || needle.includes(e.name.toLowerCase().split("/").pop()));
    panel.innerHTML =
      '<div class="msg-warn"><strong>"' + escapeHtml(targetName) + '" not found</strong></div>' +
      '<div class="meta">Scanned all ' + entries.length + " entries in the archive.</div>" +
      (similar.length
        ? '<div class="meta" style="margin-top:8px">Similar names:<br>' +
          similar.slice(0, 15).map(e => "&nbsp;&nbsp;· " + escapeHtml(e.name)).join("<br>") + "</div>"
        : "");
    resultsEl.appendChild(panel);
    renderListing(entries, panel);
  }

  function renderListing(entries, appendTo) {
    const panel = appendTo || document.createElement("div");
    if (!appendTo) { resultsEl.innerHTML = ""; panel.className = "panel"; }

    const wrap = document.createElement("div");
    wrap.style.marginTop = appendTo ? "16px" : "0";

    const filterRow = document.createElement("div");
    filterRow.className = "filter-row";
    filterRow.innerHTML = '<input type="text" placeholder="filter…" id="listFilter">';
    wrap.appendChild(filterRow);

    const table = document.createElement("table");
    table.className = "listing";
    table.innerHTML = "<thead><tr><th>name</th><th>size</th></tr></thead><tbody></tbody>";
    wrap.appendChild(table);

    const countNote = document.createElement("div");
    countNote.className = "count-note";
    wrap.appendChild(countNote);

    panel.appendChild(wrap);
    if (!appendTo) resultsEl.appendChild(panel);

    const tbody = table.querySelector("tbody");

    // sorted is re-derived each draw so the same `entries` array can grow (used
    // for the incremental listing during extraction) and redraws pick it up.
    function draw(filter) {
      const match = buildFilterMatcher(filter);
      const sorted = entries.slice().sort((a, b) => a.name.localeCompare(b.name));
      const shown = match ? sorted.filter(e => match(e.name)) : sorted;
      tbody.innerHTML = "";
      const cap = 500;
      shown.slice(0, cap).forEach((e) => {
        const tr = document.createElement("tr");
        const tdName = document.createElement("td");
        tdName.textContent = e.name;
        const tdSize = document.createElement("td");
        tdSize.className = "size";
        tdSize.textContent = e.type === "5" ? "dir" : formatBytes(e.size);
        if (e.type !== "5") {
          tr.className = "clickable";
          tr.onclick = () => navigate(urlInput.value.trim(), e.name, true);
        }
        tr.appendChild(tdName); tr.appendChild(tdSize);
        tbody.appendChild(tr);
      });
      countNote.textContent = shown.length > cap
        ? "showing " + cap + " of " + shown.length + " matching entries — refine the filter"
        : shown.length + " of " + entries.length + " entries";
    }

    const filterEl = wrap.querySelector("#listFilter");
    filterEl.value = currentFilter;
    filterEl.addEventListener("input", (e) => {
      currentFilter = e.target.value;
      syncFilterToUrl();
      draw(currentFilter);
    });
    draw(currentFilter);
    return draw;
  }

  function listingHeadHtml(entries, done) {
    return "<b>" + entries.length + "</b> entries · " +
      formatBytes(entries.reduce((s, e) => s + e.size, 0)) + " uncompressed" +
      (done ? "" : " · extracting…");
  }

  function showListing(entries) {
    if (maybeAutoOpenFirstMatch(entries)) return;
    setHeaderVisible(true);
    resultsEl.innerHTML = '<div class="panel"><div class="meta">' + listingHeadHtml(entries, true) + "</div></div>";
    renderListing(entries, resultsEl.querySelector(".panel"));
  }

  // Incremental listing shown while an archive is still extracting. Builds the
  // panel + table once, then redraws as batches of entries arrive. `entries` is
  // the same growing array across calls; `done` drops the "extracting…" note.
  let liveList = null;     // { head, redraw } while a live listing is on screen
  let liveEntries = null;  // the growing entry array backing it

  function liveListingUpdate(entries, done) {
    if (!liveList) {
      setHeaderVisible(true);
      resultsEl.innerHTML = "";
      const panel = document.createElement("div");
      panel.className = "panel";
      const head = document.createElement("div");
      head.className = "meta";
      panel.appendChild(head);
      resultsEl.appendChild(panel);
      const redraw = renderListing(entries, panel);
      liveList = { head, redraw };
    }
    liveList.head.innerHTML = listingHeadHtml(entries, done);
    liveList.redraw(currentFilter);
  }

  // Renders the current desired view from the cache. `entries` present means the
  // archive is fully cached; otherwise we can still show a single already-cached
  // file (from an early "found") with a fallback entry.
  function renderView(targetName) {
    if (!targetName) { showListing(cache.entries); return; }
    if (cache.files.has(targetName)) {
      const data = cache.files.get(targetName);
      const entry = (cache.entries && cache.entries.find(e => e.name === targetName))
        || { name: targetName, size: data.length, type: "0" };
      renderFound(entry, data);
    } else {
      renderNotFound(targetName, cache.entries);
    }
  }

  function startProgressUI() {
    viewRendered = false;
    liveList = null;
    liveEntries = null;
    setHeaderVisible(desiredTarget === ""); // hide while loading a file, show for a listing
    setBusy(true);
    bar.style.width = "0%";
    bar.classList.remove("indeterminate");
    statusLabel.textContent = "Loading…";
    statusNum.textContent = "";
    resultsEl.innerHTML = "";
  }

  // Handles messages from the extraction worker. Rendering follows the *current*
  // `desiredTarget`, not the target the worker was launched with — so navigating
  // around mid-extraction just re-points what we show. Every message also feeds
  // the in-tab cache, so once "done" lands all navigation is a synchronous hit.
  function handleScanMessage(url, msg) {
    if (msg.type === "progress") {
      if (!viewRendered) {
        updateProgress(msg);
        // On the listing view, grow the table as entries stream in.
        if (desiredTarget === "") {
          if (!liveEntries) liveEntries = [];
          if (msg.newEntries) for (const e of msg.newEntries) liveEntries.push(e);
          liveListingUpdate(liveEntries, false);
        }
      }
      return;
    }
    if (msg.type === "found") {
      cacheStore(url, null, msg.entry.name, new Uint8Array(msg.data));
      if (!viewRendered && desiredTarget === msg.entry.name) {
        viewRendered = true;
        setBusy(false);
        renderFound(msg.entry, cache.files.get(msg.entry.name));
      }
      return;
    }
    if (msg.type === "done") {
      // Absorb the whole decompressed archive into the in-tab cache: entries plus
      // every file's bytes (transferred, so we adopt the buffers), then show
      // whatever the user is currently after if it isn't already up.
      cacheStore(url, msg.entries, null, null);
      for (let i = 0; i < msg.names.length; i++)
        cache.files.set(msg.names[i], new Uint8Array(msg.buffers[i]));
      if (!viewRendered) {
        viewRendered = true;
        setBusy(false);
        if (desiredTarget === "" && liveList) {
          // Finalize the live listing in place with the authoritative full set
          // (the last streamed batch may have trailed the final progress tick),
          // keeping the table and any active filter rather than rebuilding.
          liveEntries.length = 0;
          for (const e of msg.entries) liveEntries.push(e);
          if (!maybeAutoOpenFirstMatch(liveEntries))
            liveListingUpdate(liveEntries, true);
        } else {
          renderView(desiredTarget);
        }
      }
      liveList = null;
      liveEntries = null;
      terminateWorker();
      return;
    }
    if (msg.type === "error") {
      viewRendered = true;
      setBusy(false);
      if (msg.kind === "http") renderError("Server returned " + msg.status, "HTTP " + msg.status + " " + escapeHtml(msg.statusText || ""));
      else if (msg.kind === "fetch") renderFetchFailed(url, msg.message);
      else if (msg.kind === "zstd") renderError("Couldn't decompress this as zstd", escapeHtml(msg.message || ""));
      else renderError("Something went wrong", escapeHtml(msg.message || ""));
      terminateWorker();
    }
  }

  // Starts or re-points a scan. A full cache hit renders synchronously. An
  // already-cached file renders now and lets any in-flight extraction of the
  // rest continue. If a worker is already extracting this same archive we attach
  // to it and wait — no restart. Only a genuinely new archive spawns a worker.
  function runScan(url, targetName) {
    targetName = targetName || "";
    desiredTarget = targetName;

    if (cache.url === url && cache.entries) {
      terminateWorker();
      viewRendered = true;
      setBusy(false);
      renderView(targetName);
      return;
    }

    if (targetName && cache.url === url && cache.files.has(targetName)) {
      viewRendered = true;
      setBusy(false);
      const data = cache.files.get(targetName);
      const entry = (cache.entries && cache.entries.find(e => e.name === targetName))
        || { name: targetName, size: data.length, type: "0" };
      renderFound(entry, data);
      return;
    }

    if (currentWorker && scanUrl === url) {
      // Same archive is already being extracted — just wait for it to finish.
      startProgressUI();
      return;
    }

    terminateWorker();
    scanUrl = url;
    startProgressUI();
    const worker = new Worker(workerUrl);
    currentWorker = worker;
    worker.onmessage = (ev) => handleScanMessage(url, ev.data);
    worker.onerror = () => {
      if (viewRendered) return;
      viewRendered = true;
      setBusy(false);
      renderError("Something went wrong", "The decompression worker failed to start.");
      terminateWorker();
    };
    worker.postMessage({ url, targetName });
  }

  // The URL is the source of truth: ?archive=<url>[&file=<name>][&filter=<glob>].
  // navigate() syncs the inputs, the history entry, and the scan; popstate
  // replays whatever the URL says without pushing a new entry. The filter is
  // carried along so a filtered listing survives navigating into a file and back.
  let currentFilter = "";

  // A one-shot directive (URL param `viewFirstFilterMatch`): when a listing with
  // an active filter finalizes, auto-open the first matching file instead of
  // showing the listing. Consumed on first use so navigating back to the listing
  // sticks rather than bouncing straight back into the file.
  let viewFirstFilterMatch = false;

  // A one-shot directive (URL param `jumpToTestFailure`): a testlib result label
  // such as "tst_QFoo::someFunction(some data tag)" to scroll to and flash once
  // the file it lives in is rendered. Consumed on the first successful jump.
  let jumpToTestFailure = null;

  // Locate a parsed result by its label, tolerating whitespace differences and a
  // caller that omits the data tag (exact → prefix → substring).
  function findTestResultIndex(results, needle) {
    const norm = s => s.replace(/\s+/g, " ").trim();
    const want = norm(needle);
    let idx = results.findIndex(r => norm(r.label) === want);
    if (idx < 0) idx = results.findIndex(r => norm(r.label).startsWith(want));
    if (idx < 0) idx = results.findIndex(r => norm(r.label).includes(want));
    return idx;
  }

  function maybeAutoOpenFirstMatch(entries) {
    if (!viewFirstFilterMatch) return false;
    const match = buildFilterMatcher(currentFilter);
    if (!match) return false;
    const sorted = entries.slice().sort((a, b) => a.name.localeCompare(b.name));
    const hit = sorted.find(e => e.type !== "5" && match(e.name));
    if (!hit) return false;
    viewFirstFilterMatch = false;
    navigate(urlInput.value.trim(), hit.name, true);
    return true;
  }

  function buildUrl() {
    const params = new URLSearchParams();
    params.set("archive", urlInput.value.trim());
    const file = filenameInput.value.trim();
    if (file) params.set("file", file);
    if (currentFilter) params.set("filter", currentFilter);
    return window.location.pathname + "?" + params.toString();
  }

  function navigate(archive, file, push) {
    urlInput.value = archive;
    filenameInput.value = file || "";
    const url = buildUrl();
    const state = { archive, file: file || null, filter: currentFilter };
    if (push) history.pushState(state, "", url);
    else history.replaceState(state, "", url);
    runScan(archive, file || "");
    // Forward navigations start at the top; back/forward go through popstate
    // (not here), so the browser's scroll restoration keeps their position.
    window.scrollTo(0, 0);
  }

  // Reflect a filter change in the URL without pushing a history entry per keystroke.
  function syncFilterToUrl() {
    history.replaceState(
      { archive: urlInput.value.trim(), file: null, filter: currentFilter },
      "", buildUrl());
  }

  window.addEventListener("popstate", () => {
    const params = new URLSearchParams(window.location.search);
    const archive = params.get("archive");
    if (!archive) {
      // Back to the bare page — abort any scan and reset to the empty form.
      terminateWorker();
      setHeaderVisible(true);
      urlInput.value = "";
      filenameInput.value = "";
      currentFilter = "";
      resultsEl.innerHTML = "";
      return;
    }
    const file = params.get("file");
    currentFilter = params.get("filter") || "";
    urlInput.value = archive;
    filenameInput.value = file || "";
    runScan(archive, file || "");
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const url = urlInput.value.trim();
    const targetName = filenameInput.value.trim();
    if (!url) return;
    currentFilter = "";
    navigate(url, targetName, true);
  });

  cancelBtn.addEventListener("click", () => {
    if (currentWorker) {
      terminateWorker();
      setBusy(false);
      renderError("Cancelled", null);
    }
  });

  // Bootstrap from the initial URL, replacing (not pushing) so back doesn't
  // land on a blank in-app state.
  const initialParams = new URLSearchParams(window.location.search);
  const initialArchive = initialParams.get("archive");
  if (initialArchive) {
    currentFilter = initialParams.get("filter") || "";
    viewFirstFilterMatch = initialParams.has("viewFirstFilterMatch");
    jumpToTestFailure = initialParams.get("jumpToTestFailure") || null;
    navigate(initialArchive, initialParams.get("file") || "", false);
  }
})();
</script>
</body>
</html>
